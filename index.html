<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Charset & Responsive -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Theme -->
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- SEO -->
    <title>VOXAND | Reasoning. Standardized.</title>

    <meta name="description"
        content="VOXAND is an AI-native reasoning framework that enables experts to reason with artificial intelligence in their own professional language.">

    <link rel="canonical" href="https://voxand.org/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://voxand.org/">
    <meta property="og:title" content="VOXAND">
    <meta property="og:description" content="Reasoning. Standardized.">
    <meta property="og:image" content="https://voxand.org/assets/logo.png">
    <meta property="og:site_name" content="VOXAND">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VOXAND">
    <meta name="twitter:description" content="Reasoning. Standardized.">
    <meta name="twitter:image" content="https://voxand.org/assets/logo.png">

    <!-- Icons -->

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">


    <!-- Schema.org -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://voxand.org/#organization",
      "name": "VOXAND",
      "url": "https://voxand.org/",
      "logo": "https://voxand.org/assets/logo.png",
      "slogan": "Reasoning. Standardized.",
      "description": "VOXAND is an AI-native reasoning framework that enables experts to reason with artificial intelligence in their own professional language."
    },
    {
      "@type": "WebSite",
      "@id": "https://voxand.org/#website",
      "url": "https://voxand.org/",
      "name": "VOXAND",
      "publisher": {
        "@id": "https://voxand.org/#organization"
      },
      "inLanguage": "en"
    }
  ]
}
    </script>

    <style>

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Avenir Next",
                Helvetica,
                Arial,
                sans-serif;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .logo {
            width: min(1100px, 88vw);
            height: auto;
            display: block;
            margin: 0 auto;
        }

.tagline {
    margin-top: 18px;
    font-family: Optima,
                 "Optima LT Std",
                 "Avenir Next",
                 Helvetica,
                 Arial,
                 sans-serif;
font-size: 36px;
letter-spacing: .14em;
font-weight: 400;
    color: #222222;
    text-align: center;
}

        @media (max-width:768px) {

            .logo {
                width: 92vw;
            }

            .tagline {
                font-size: 14px;
                letter-spacing: .22em;
                margin-top: 18px;
            }

        }

    </style>

</head>

<body>

    <div class="container">
        <img src="assets/logo.png" class="logo" alt="VOXAND">
        <div class="tagline">REASONING. STANDARDIZED.</div>
    </div>

</body>

</html>
